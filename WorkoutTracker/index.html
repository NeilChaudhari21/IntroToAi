<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Workout Tracker</h1>
    <section class="input-panel">
      <h2>Log Exercise</h2>
      <form id="exercise-form">
        <label>Exercise
          <select id="exercise-name" required>
            <option value="">Select an exercise</option>
            <option>Bench Press</option>
            <option>Squat</option>
            <option>Deadlift</option>
            <option>Overhead Press</option>
            <option>Pull Up</option>
            <option>Barbell Row</option>
            <option>Leg Press</option>
            <option>Lat Pulldown</option>
            <option>Dumbbell Curl</option>
          </select>
        </label>
        <label>Weight (lbs) <input type="number" id="exercise-weight" min="0" required /></label>
        <label>Sets <input type="number" id="exercise-sets" min="1" value="3" required /></label>
        <label>Reps <input type="number" id="exercise-reps" min="1" value="8" required /></label>
        <label>Date <input type="date" id="exercise-date" required /></label>
        <button type="submit">Add Entry</button>
      </form>
    </section>

    <section class="logs-section">
      <h2>Workout Log</h2>
      <div id="stats" class="stats"></div>
      <table id="log-table">
        <thead>
          <tr><th>Date</th><th>Exercise</th><th>Weight</th><th>Sets</th><th>Reps</th><th>Volume</th><th>Actions</th></tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </section>

    <section class="chart-section">
      <h2>Progress Over Time</h2>
      <canvas id="progress-chart" width="800" height="400"></canvas>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
